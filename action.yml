name: Setup Clipper
description: Install the Clipper CLI for chunked OCI image pulls
branding:
  icon: download
  color: blue

inputs:
  version:
    description: Clipper version to install (e.g. v0.1.0). Defaults to latest.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install Clipper
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  ARCH=amd64 ;;
          aarch64) ARCH=arm64 ;;
          arm64)   ARCH=arm64 ;;
          *)       echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
        esac

        if [ "$VERSION" = "latest" ]; then
          URL="https://dl.clipper.dev/clipper-${OS}-${ARCH}"
        else
          URL="https://dl.clipper.dev/archive/${VERSION}/clipper-${OS}-${ARCH}"
        fi

        echo "Downloading clipper from $URL ..."
        curl -fsSL "$URL" -o /usr/local/bin/clipper
        chmod +x /usr/local/bin/clipper

        echo "Installed clipper $(clipper version 2>&1 || echo "$VERSION")"
